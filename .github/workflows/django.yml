name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: my_site.settings

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      run: |
        python manage.py migrate

    - name: Generate pydoc documentation
      run: |
        mkdir -p docs
        python -c "import django; django.setup(); import pydoc; pydoc.writedoc('blog.views')"
        python -c "import django; django.setup(); import pydoc; pydoc.writedoc('blog.models')"
        mv blog.views.html docs/
        mv blog.models.html docs/

    - name: Publish docs
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add docs/
        git commit -m "update pydoc docs" || echo "No changes"
        git push