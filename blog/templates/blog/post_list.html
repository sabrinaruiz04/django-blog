{% extends "blog/base.html" %}
{% block content %}
<div class="container">
  <h1 class="my-4">Llistat de tots els posts</h1>
  <div class="row">
    {% for post in posts %}
    <div class="col-md-3 mb-4">
      <div class="card h-100">
        {% if post.image %}
          <img src="{{ post.image.url }}" class="card-img-top" style="height:180px; object-fit:cover;" alt="{{ post.title }}">
        {% endif %}
        <div class="card-body">
          <h5 class="card-title fw-bold">{{ post.title }}</h5>
          <p class="card-text">{{ post.excerpt }}</p>
          <a href="{% url 'posts-detail-page' post.slug %}" class="btn btn-primary btn-sm">Llegir més</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
